; PlatformIO Project Configuration File
; LifeLine Emergency Communication System (RX & TX)
; http://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = rx_pro, tx_pro

[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; Common dependencies for both RX and TX
lib_deps =
    sandeepmistry/LoRa @ ^0.8.0

[env:rx_pro]
src_dir = lifeline_rx_pro
lib_deps =
    ${env.lib_deps}
    marcoschwartz/LiquidCrystal_I2C @ ^1.1.4

[env:tx_pro]
src_dir = lifeline_tx_pro
lib_deps =
    ${env.lib_deps}
    adafruit/Adafruit GFX Library @ ^1.11.9
    adafruit/Adafruit ST7789 and ST7735 Library @ ^1.10.3
    chrisl8/Keypad @ ^3.6.0
